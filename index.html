<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Roomies — Legal</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #3a6df0 0%, #5a4ff0 100%);
    color: #1f2733;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    padding: 24px;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 40px 36px;
    max-width: 460px;
    width: 100%;
    box-shadow: 0 16px 48px rgba(20, 24, 40, 0.28);
    text-align: center;
  }
  .brand {
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-size: 13px;
    font-weight: 700;
    color: #5a4ff0;
  }
  h1 { font-size: 26px; margin: 10px 0 6px; }
  p { color: #5b6573; line-height: 1.6; margin: 0 0 26px; }
  .links { display: grid; gap: 12px; }
  a.btn {
    display: block;
    padding: 14px 18px;
    border-radius: 10px;
    text-decoration: none;
    font-weight: 600;
    border: 1px solid #e3e7ee;
    color: #1f2733;
    transition: background .15s, border-color .15s;
  }
  a.btn:hover { background: #eef2fe; border-color: #c9d4fb; }
  footer { margin-top: 26px; font-size: 13px; color: #8a93a1; }
</style>
</head>
<body>
  <div class="card">
    <div class="brand">Roomies</div>
    <h1>Legal &amp; Privacy</h1>
    <p>Find your perfect roommate. The documents below explain how Roomies works and how we handle your data.</p>
    <div class="links">
      <a class="btn" href="privacy/">Privacy Policy</a>
      <a class="btn" href="terms/">Terms of Service</a>
    </div>
    <footer>&copy; Roomies</footer>
  </div>
</body>
</html>
